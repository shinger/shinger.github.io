      <h1 class="article-title">夜晚，窗台</h1>
      <p class="article-meta">
        笙歌<span class="sep">/</span>二零二四年 八月 二十二日<span class="sep">/</span>约 118 字<span class="sep">/</span>阅读约 1 分钟

    <div class="article-body poetry">
      <p>城市，总在夜晚最热闹</p>
<p>街灯，车流，还有孩子</p>
<p>世界吵闹</p>
<p>窗台没有点灯</p>
<p>只有夜色的半颗星</p>
<p>我像一尊石像静坐。半晌</p>
<p>此时窗外沉默</p>
<p>只剩几束金黄色的光线</p>
<p>恍惚在我的眼前</p>
<p>世界向内坍缩</p>
<p>缩在一个角落</p>
<p>像一团乱麻纠缠不清的样子</p>
<p>剪子都显得迟钝</p>
<p>像一块巨石不停的下沉</p>
<p>沉重到湖底</p>
<p>重得凄凉</p>

    </div>
