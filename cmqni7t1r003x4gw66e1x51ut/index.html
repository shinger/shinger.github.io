      <p class="article-meta">
        笙歌<span class="sep">/</span>二零二四年 七月 二十三日<span class="sep">/</span>约 90 字<span class="sep">/</span>阅读约 1 分钟

    <div class="article-body poetry">
      <p>闲言碎语，将他击落<br>将他，拖入一片汪洋<br>他苦苦挣扎着，最后<br>缓缓地，坠入绝望的谷底</p>
<p>于是——<br>水草冷落他<br>鱼儿嘲笑他<br>他只好，支起壁障</p>
<p>最后，终于被船儿托起<br>海水越来越浅<br>喘息着，不停地喘息着<br>在一滩死水中<br>捡拾撕开的伤疤</p>

    </div>
