  <header class="article-header">
    <h1 class="article-title">关于</h1>
  </header>
  <div class="article-body">
    <p>我是未语清，「拾遗」的写作者。</p>
<p>这里记录的，大多是一些来不及被归类的念头：读书时折起的一角，菜市场里听来的吆喝，地铁上想完又忘记的句子。我相信日常本身就值得被认真书写，相信那些被主流叙事忽略的褶皱，往往藏着更真实的时代侧影。</p>
<p>「拾遗」取自古人收集散佚诗文的传统——拾起那些将要被遗忘的，无论是别人的，还是自己的。</p>
<p>如果你也喜欢慢一点的阅读，欢迎常来坐坐。</p>

  </div>
