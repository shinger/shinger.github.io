      <h1 class="article-title">无人知晓的春天</h1>
      <p class="article-meta">
        笙歌<span class="sep">/</span>二零二四年 八月 一日<span class="sep">/</span>约 149 字<span class="sep">/</span>阅读约 1 分钟

    <div class="article-body poetry">
      <p>落叶啊，你本该葬于泥土<br>可你生来倔强、顽固<br>埋没了野豌豆和三叶草<br>风霜啊，你本该褪去<br>可时间被冻结在夜色里<br>萧瑟了风影下的新枝<br>那本该告别的，冬天<br>却念念不忘</p>
<p>渴望被打扰<br>可是园门紧闭<br>不留一丝缝隙<br>谁轻声敲响<br>敲碎了满地的长春花<br>那梦也似的幻想——<br>朦胧在一簇簇绽放<br>一声声清鸣</p>
<p>远处无数个春天<br>无人知晓的无数个春天<br>都在高昂的，歌唱着他们的生命</p>
