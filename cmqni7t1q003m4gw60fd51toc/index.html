      <p class="article-meta">
        笙歌<span class="sep">/</span>二零二四年 九月 二十九日<span class="sep">/</span>约 100 字<span class="sep">/</span>阅读约 1 分钟

    <div class="article-body poetry">
      <p>当水草淹没的时候</p>
<p>他们并不留意</p>
<p>就像他们落在水中</p>
<p>一样悄无声息</p>
<p>从一片海游到一片海</p>
<p>划破一条波纹</p>
<p>不吐露一颗水珠</p>
<p>等候多时的岸</p>
<p>片刻收留过</p>
<p>给他们送来一颗岛屿</p>
<p>于是海与岸间拥挤着</p>
<p>乱成一团麻</p>
<p>在那些浪花的卷动下</p>
<p>翻个面</p>
<p>然后死去</p>

    </div>
