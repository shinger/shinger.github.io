      <h1 class="article-title">高岭之花</h1>
      <p class="article-meta">
        笙歌<span class="sep">/</span>二零二四年 十一月 二日<span class="sep">/</span>约 151 字<span class="sep">/</span>阅读约 1 分钟

    <div class="article-body poetry">
      <p>攀着高枝肆意的叶</p>
<p>在风中顺势作响</p>
<p>缠绕了几百遍的麻</p>
<p>没能拧碎那些</p>
<p>昨日的藤长在今天的绿野</p>
<p>吹了一夜的风在这里被宣判死刑</p>
<p>从泥土里长出来的芽</p>
<p>被树影压着</p>
<p>缝隙里望着太阳</p>
<p>松针、枯叶，坠落满地</p>
<p>拥挤的，嘈杂的</p>
<p>偏偏老树最根深</p>
<p>把光秃的枝干当作风景</p>
<p>那些新色的绿惹人嫌</p>
<p>教它们也一并妒忌着旧的颜色</p>
<p>成长应该在高原俯瞰平地</p>
<p>就像远帆才会望见岸的无边</p>

    </div>
