      <p class="article-meta">
        笙歌<span class="sep">/</span>二零二五年 一月 二十九日<span class="sep">/</span>约 131 字<span class="sep">/</span>阅读约 1 分钟

    <div class="article-body poetry">
      <p>窗外只剩下那些了</p>
<p>那隔着耳膜的响声——砰——砰</p>
<p>一次又一次在空洞的房间里绽开</p>
<p>又一瞬间寂静</p>
<p>反复着……</p>
<p>就像刀子一次又一次插入身体</p>
<p>再拔出来</p>
<p>隔壁的男人和女人</p>
<p>比往日快活多了</p>
<p>好像生命只剩下此刻</p>
<p>那般狂欢</p>
<p>后来只剩下几句短暂的对白</p>
<p>因为今日和往日并无不同</p>
<p>一样空洞</p>
<p>只是被搁置的笔还在提醒着</p>
<p>那未尽的生命</p>

    </div>
