      <h1 class="article-title">灵魂的高塔</h1>
      <p class="article-meta">
        笙歌<span class="sep">/</span>二零二四年 七月 八日<span class="sep">/</span>约 139 字<span class="sep">/</span>阅读约 1 分钟

    <div class="article-body poetry">
      <p>脆弱的、不安的那座高塔<br>在好久以前就摇摇欲坠<br>我站在塔顶<br>担忧，或者无视<br>却都摆脱不了那根基的摇晃<br>那缺失的部分，早已预示着一切<br>是毁灭还是提心吊胆的一生</p>
<p>我知道，总该去修补好的<br>那根基太深，太牢固<br>我费尽全力去稳固它<br>最后轰隆一声，高塔也随之全部倾倒<br>我知道，这是应有的<br>我也知道，这是值得的<br>不然你如何却盖起新的高塔</p>

    </div>
