    <div class="article-body poetry">
      <p>一幕精心上演的戏剧<br>一个扮演哲学家的配角<br>在不为人知的地方<br>是一片汹涌的，虚无的海<br>此岸<br>是神经末梢连接的思绪<br>彼岸<br>是没有边际的轮廓</p>
<p>走马灯式的过往<br>循环着播放<br>反复咀嚼的，一句漫不经心的话<br>重复演绎的，不曾发生过的凶杀案<br>再三计算的，一道无解的谜题<br>自我矛盾，逐渐窒息<br>在最喧闹的地方<br>回避逃离<br>在最安静的地方<br>吵嚷不停</p>
