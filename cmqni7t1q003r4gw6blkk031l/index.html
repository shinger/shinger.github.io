      <p class="article-meta">
        笙歌<span class="sep">/</span>二零二四年 七月 三十一日<span class="sep">/</span>约 152 字<span class="sep">/</span>阅读约 1 分钟

    <div class="article-body poetry">
      <p>光阴里藏着一束火花<br>包裹着一块黑炭和沉默<br>漆黑的风，吹尽了往事<br>轻柔的，却助长了卑微的气焰<br>那些摇曳的，烛光<br>恍惚不定，闪灭，融化<br>乌云也遮住了仅剩的一丝光<br>风越吹越盛，火越长越旺<br>被烧掉的是，过往埋下的一颗种子<br>和那缺了一块<br>怎么也拼凑不好的心<br>血流不出来<br>就化成水珠，丝丝如雨下<br>浇灭了这场野火<br>你看啊，又烧掉了刚刚种好的花儿<br>罢了，生命里的一粒尘沙</p>
